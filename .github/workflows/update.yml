name: Update formula

on:
  repository_dispatch:
    types: [new-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to package (e.g. v1.2.3)"
        required: true
        type: string

jobs:
  update:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        id: python
        with:
          python-version: "3.13"

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${{ github.event.client_payload.version }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ver=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for PyPI to propagate
        if: github.event_name == 'repository_dispatch'
        env:
          VER: ${{ steps.ver.outputs.ver }}
        run: |
          sleep 15
          MAX=30
          COUNT=0
          until curl -sf "https://pypi.org/pypi/lyrsmith/$VER/json" > /dev/null; do
            COUNT=$((COUNT+1))
            if [ $COUNT -ge $MAX ]; then
              echo "Timed out waiting for lyrsmith $VER on PyPI after $((15 + COUNT * 10))s"
              exit 1
            fi
            echo "Not yet available (attempt $COUNT/$MAX), retrying in 10s..."
            sleep 10
          done
          echo "lyrsmith $VER is available on PyPI"

      - name: Generate formula
        env:
          VER: ${{ steps.ver.outputs.ver }}
        run: |
          PY="${{ steps.python.outputs.python-path }}"
          # Use a venv for full isolation from the macOS framework Python's site-packages,
          # which otherwise bleeds into sys.path and causes pkg_resources import errors.
          "$PY" -m venv /tmp/poet-env
          /tmp/poet-env/bin/pip install "setuptools<81" homebrew-pypi-poet "lyrsmith==$VER"
          /tmp/poet-env/bin/poet -f lyrsmith > Formula/lyrsmith.rb
          # Inject native dependencies — poet only covers PyPI packages
          "$PY" - <<'EOF'
          import re, pathlib
          p = pathlib.Path("Formula/lyrsmith.rb")
          text = p.read_text()

          # Fix poet's placeholder metadata
          text = re.sub(r'desc ".*?"', 'desc "TUI app for transcribing and editing synced song lyrics"', text)
          text = re.sub(r'homepage ".*?"', 'homepage "https://github.com/triluch/lyrsmith"', text)

          # Remove poet's generic "python3" dep — we pin python@3.13 below
          text = re.sub(r'\n  depends_on "python3"\n', '\n', text)

          # Remove all resource blocks — unused since def install calls pip directly
          text = re.sub(r'\n  resource "[^"]*" do\n.*?\n  end\n', '\n', text, flags=re.DOTALL)

          # Collapse multiple blank lines into one
          text = re.sub(r'\n{3,}', '\n\n', text)

          # Insert depends_on before the first resource or def install block
          def inject(m):
              return '\n  depends_on "mpv"\n  depends_on "python@3.13"\n' + m.group(1)
          text = re.sub(r'(\n  (?:resource |def ))', inject, text, count=1)

          # Use python3.13 explicitly and install via pip with --prefer-binary
          # so binary-wheel-only deps (ctranslate2, onnxruntime, etc.) are handled.
          # Clean venv (no --system-site-packages) avoids conflicts with Homebrew's
          # Python site-packages; explicit pip upgrade ensures a working pip.
          text = re.sub(
              r'  def install\n.*?  end\n',
              '  def install\n'
              '    python = Formula["python@3.13"].opt_bin/"python3.13"\n'
              '    system python, "-m", "venv", libexec\n'
              '    system libexec/"bin/pip", "install", "--upgrade", "pip"\n'
              '    system libexec/"bin/pip", "install", "--prefer-binary", "lyrsmith==#{version}"\n'
              '    bin.install_symlink Dir["#{libexec}/bin/lyrsmith"]\n'
              '  end\n',
              text, flags=re.DOTALL
          )

          p.write_text(text)
          EOF

      - name: Commit formula locally
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add Formula/lyrsmith.rb
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "lyrsmith $TAG"

      - name: Verify formula installs and runs
        run: |
          # Tap the local repo after committing so brew clones the actual generated formula
          brew tap triluch/lyrsmith "$(pwd)"
          echo "Local formula sha256:  $(shasum -a 256 Formula/lyrsmith.rb)"
          echo "Tapped formula sha256: $(shasum -a 256 "$(brew --repository triluch/lyrsmith)/Formula/lyrsmith.rb")"
          brew install --build-from-source triluch/lyrsmith/lyrsmith
          lyrsmith --help

      - name: Push
        run: git push
